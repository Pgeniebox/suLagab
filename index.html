<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Console Overlay</title>
<style>
  :root{
  --panel-strong: rgba(14,11,20,0.78);
  --card-bg: #1b1622;
  --text-hi: #f5f3f8;
  --text-lo: rgba(245,243,248,0.62);
  --focus-ring: #ffffff;
  --dlg-panel-bg: linear-gradient(to top, rgba(255, 255, 255, 0.062) 0%, rgba(255, 255, 255, 0.075) 38%, rgba(46, 30, 112, 0.089) 100%);
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:-apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  overflow:hidden;
 background:
    radial-gradient(ellipse 60% 40% at 78% 18%, rgba(232,148,90,0.35), transparent 60%),
    radial-gradient(ellipse 70% 50% at 22% 8%, rgba(160,90,180,0.30), transparent 60%),
    linear-gradient(165deg, #2f6b4a 0%, #244a3a 35%, #1c2f33 70%, #15171f 100%);

}

.scene{
  position:fixed;
  inset:0;
  background:rgba(245,243,248,0.02);
  backdrop-filter:blur(5px);

}

.bottom-scrim{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:46%;
  background:linear-gradient(to top, rgba(6,5,10,0.95) 0%, rgba(6,5,10,0.65) 38%, rgba(6,5,10,0) 100%);
  pointer-events:none;
}

.status-pill{
  position:fixed;
  top:22px;
  right:22px;
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--panel-strong);
  border-radius:14px;
  padding:10px 16px;
  backdrop-filter:blur(14px);
  z-index:3;
  transition:transform .2s ease, opacity .2s ease, background-color .2s ease;
}

.status-pill .clock{
  color:var(--text-hi);
  font-size:15px;
  font-weight:600;
  letter-spacing:0.3px;
}

.status-pill svg{
  width:20px;
  height:20px;
  fill:var(--text-hi);
  opacity:0.9;
}

/* ===================== RAIL ===================== */
.rail-wrap{
  position:fixed;
  left:0;
  right:0;
  bottom:118px;
  padding-left:34px;
  z-index:5;
}

.rail{
  display:flex;
  align-items:flex-end;
  gap:16px;
  overflow:visible;
  scrollbar-width:none;
  padding-bottom:4px;
}

.rail::-webkit-scrollbar{
  display:none;
}

.card{
  position:relative;
  flex:0 0 auto;
  width:24vw;
  height:20vh;
  border-radius:8px;
  background:var(--card-bg);
  overflow:hidden;
  box-shadow:0 18px 30px rgba(0,0,0,0.45);
  outline:4px solid transparent;
  outline-offset:-3px;
  cursor:pointer;
  transform:translateY(0) scale(1);
  transform-origin:top center;
  transition:transform .18s ease, outline-color .18s ease, box-shadow .18s ease, filter .18s ease;
  will-change:transform;
}

.card.hero{
   width:28vw;
  height:24vh;
}

.card.is-focused{
  transform:translateY(-8px) scale(1.02);
  outline-color:var(--focus-ring);
  z-index:2;
}

.card-art{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  background-color:#171320;
}

.art-1{
  background:linear-gradient(160deg,#1a2a4d,#0c1a33), radial-gradient(circle at 70% 35%, rgba(255,60,140,0.5), transparent 55%);
}

.art-2{
  background:linear-gradient(160deg,#171320,#0c0a14);
}

.art-3{
  background:linear-gradient(165deg,#2a6fae,#143a5c 60%,#0c2438);
}

.art-4{
  background:linear-gradient(165deg,#4a2a52,#7a3a5c 55%,#2c1622);
}

.art-5{
  background:linear-gradient(165deg,#3a2a52,#5c3a6e 55%,#22152c);
}

.favicon{
  position:absolute;
  top:12px;
  left:12px;
  width:30px;
  height:30px;
  border-radius:6px;
  background:rgba(10,8,16,0.75);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.favicon img,
.favicon svg{
  width:18px;
  height:18px;
}

.favicon .letter{
  font-size:14px;
  font-weight:700;
  color:#fff;
}

.sound-badge{
  position:absolute;
  top:12px;
  right:12px;
  width:30px;
  height:30px;
  border-radius:6px;
  background:rgba(10,8,16,0.75);
  display:flex;
  align-items:center;
  justify-content:center;
}

.sound-bars{
  display:flex;
  align-items:flex-end;
  gap:2px;
  height:14px;
}

.sound-bars span{
  display:block;
  width:3px;
  background:#fff;
  border-radius:1px;
}

.sound-bars span:nth-child(1){
  height:6px;
  animation-delay:0s;
}

.sound-bars span:nth-child(2){
  height:12px;
  animation-delay:0.15s;
}

.sound-bars span:nth-child(3){
  height:8px;
  animation-delay:0.3s;
}

@keyframes bounce{
  0%,100%{ transform:scaleY(0.5); }
  50%{ transform:scaleY(1); }
}

.card-footer{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:14px 16px 16px;
  background:linear-gradient(to top, rgba(10,8,15,0.95) 35%, rgba(10,8,15,0.0) 100%);
}

.card-footer .eyebrow{
  font-size:12.5px;
  color:var(--text-lo);
  margin:0 0 2px;
}

.card-footer .title{
  font-size:18px;
  color:var(--text-hi);
  font-weight:700;
  margin:0;
  line-height:1.2;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* ===================== DOCK ===================== */
.dock{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:visible;
  gap:46px;
  z-index:10;
}

.dock-item{
  position:relative;
  width:30px;
  height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,0.78);
  cursor:pointer;
  border-radius:8px;
  outline:3px solid transparent;
  outline-offset:6px;
  transition:color .15s ease, outline-color .15s ease, transform .15s ease;
  transform:translateY(0) scale(1);
}

.dock-item svg{
  width:26px;
  height:26px;
  fill:currentColor;
}

.dock-item.active{
  color:#fff;
}

.dock-item.active::after{
  content:"";
  position:absolute;
  bottom:-16px;
  left:50%;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#fff;
  transform:translateX(-50%);
}

.dock-item.is-focused{
  color:#fff;
  outline-color:var(--focus-ring);
  transform:translateY(-1px) scale(1.03);
}

.dock-item.avatar{
  width:42px;
  height:42px;
  border-radius:10px;
  background:linear-gradient(160deg,#c9536f,#7a2d4a);
  overflow:hidden;
}

.dock-item.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.dock-item .badge{
  position:absolute;
  top:-6px;
  right:-10px;
  background:#3ddc84;
  color:#06210f;
  font-size:11px;
  font-weight:700;
  border-radius:9px;
  padding:1px 6px;
  border:2px solid #0a0810;
  display:none;
}

.dock-item .badge.show{
  display:block;
}

.dock-item .badge.green-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#3ddc84;
  padding:0;
  top:-2px;
  right:-4px;
  border:2px solid #0a0810;
}

.dock-item .mini-batt{
  position:absolute;
  bottom:-14px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  color:rgba(255,255,255,0.6);
  font-weight:600;
  white-space:nowrap;
  display:none;
}

.dock-item .mini-batt.show{
  display:block;
}

/* ===================== DIALOGUE / MODAL ===================== */
.dlg-overlay{
  position:fixed;
  inset:0;
  background:rgba(6,5,10,0.45);
  backdrop-filter:blur(0px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
  opacity:0;
  padding:24px;
  transition:opacity .18s ease, backdrop-filter .18s ease;
}

.dlg-overlay.open{
  opacity:1;
  backdrop-filter:blur(18px);
}

.dlg-panel{
  padding:5px;
  width:fit-content;
  min-width:24vw;
  min-height: fit-content;
  background:var(--dlg-panel-bg);
  background-size:cover;
  background-position:center;
  border-radius:16px;
  box-shadow:0 30px 60px rgba(0,0,0,0.55);
  transform:translateY(14px) scale(0.97);
  overflow:visible;
  transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  will-change:transform;
    backdrop-filter:blur(18px);

}

.dlg-overlay.open .dlg-panel{
  transform:translateY(0) scale(1);
}

.dlg-preview-wrap{
  margin:10px 0 ;
  position: relative;
  top:0;
  display:flex;
  justify-content:center;
}


.dlg-preview{
  pointer-events:none;
  transform:scale(0.80);
  transform-origin:center center;
}

.dlg-preview.is-focused{
  outline-color:transparent !important;
  transform:scale(0.80) !important;
}

.dlg-title{
  color:var(--text-hi);
  font-size:17px;
  font-weight:700;
  padding:16px 22px 4px;
  margin:0;
}

.dlg-subtitle{
  color:var(--text-lo);
  font-size:13px;
  padding:0 22px 14px;
  margin:0;
}

.dlg-options{
  display:flex;
  flex-direction:column;
  padding:8px 14px 18px;
  gap:4px;
}

.dlg-option{
  display:flex;
  align-items:center;
  gap:12px;
  background:transparent;
  border:none;
  color:var(--text-hi);
  font-size:15px;
  text-align:left;
  padding:12px 12px;
  border-radius:10px;
  cursor:pointer;
  outline:2px solid transparent;
  outline-offset:2px;
  transition:background .12s ease, outline-color .12s ease, transform .12s ease;
}

.dlg-option:hover,
.dlg-option:focus,
.dlg-option.is-focused{
  background:rgba(255,255,255,0.08);
  outline-color:rgba(255,255,255,0.5);
}

.dlg-opt-icon{
  width:20px;
  height:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}

.dlg-opt-icon svg{
  width:20px;
  height:20px;
  fill:currentColor;
}

.dlg-option.is-danger{
  color:#ff7a7a;
}
  /* ===================== TEMPLATES (the single source-of-truth example of each element) ===================== */
  /* These <template> blocks never render on screen by themselves - they exist purely so
     renderCard()/renderDockItem() have exactly ONE example to clone and fill with data. */
</style>
</head>
<body>

  <div class="scene"></div>
  <div class="bottom-scrim"></div>

  <div class="status-pill">
    <span class="clock" id="clock">4:12 PM</span>
    <svg viewBox="0 0 24 24"><path d="M7 6a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v3h2a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h2V6zm2 1v2h6V7H9z"/></svg>
  </div>

  <div class="rail-wrap">
    <div class="rail" id="rail"></div>
  </div>

  <div class="dock" id="dock"></div>

  <!-- ============ ONE example card. Cloned + filled by renderCard(data). ============ -->
  <template id="card-template">
    <div class="card" tabindex="0" data-row="rail">
      <div class="card-art art-1"></div>
      <div class="favicon"><span class="letter">?</span></div>
      <div class="sound-badge"><div class="sound-bars"><span></span><span></span><span></span></div></div>
      <div class="card-footer">
        <p class="eyebrow">example.com</p>
        <p class="title">Example title</p>
      </div>
    </div>
  </template>

  <!-- ============ ONE example dock item. Cloned + filled by renderDockItem(data). ============ -->
  <template id="dock-template">
    <div class="dock-item" tabindex="0" data-row="dock">
      <span class="dock-icon-slot"></span>
      <span class="badge"></span>
    </div>
  </template>

<script>
/* =====================================================================================
   ICON LIBRARY — small set of named SVGs Java can reference by key instead of sending
   raw markup every time. Pass { iconKey: "home" } or { iconSvg: "<svg>...</svg>" }.
   ===================================================================================== */
var ICONS = {
  home:   '<svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>',
  bell:   '<svg viewBox="0 0 24 24"><path d="M12 22a2.2 2.2 0 0 0 2.2-2.2h-4.4A2.2 2.2 0 0 0 12 22zm7-5.4V11c0-3.4-1.8-6.2-5-7v-.8a2 2 0 1 0-4 0V4c-3.2.8-5 3.6-5 7v5.6L3 18.6V20h18v-1.4z"/></svg>',
  cast:   '<svg viewBox="0 0 24 24"><path d="M16 11c1.7-1.7 1.7-4.3 0-6m3 9c2.8-2.8 2.8-7.2 0-10M5 9v6h4l5 5V4L9 9H5z"/></svg>',
  music:  '<svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13M9 9l12-2M6 16a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm12-2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>',
  mic:    '<svg viewBox="0 0 24 24"><path d="M5 9v6h4l5 5V4L9 9H5zm11.5 3c0-1.7-.7-3.2-2-4.2v8.4c1.3-1 2-2.5 2-4.2z"/></svg>',
  gear:   '<svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.9V21h2v-3.1A7 7 0 0 0 19 11h-2z"/></svg>',
  power:  '<svg viewBox="0 0 24 24"><path d="M17 6.5A8 8 0 1 1 7 6.5M12 2v8"/></svg>',
  wifi:   '<svg viewBox="0 0 24 24"><path d="M12 2C7 2 3 6.3 3 11.5c0 3.2 1.6 6 4 7.6V14a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v5.1c2.4-1.6 4-4.4 4-7.6C21 6.3 17 2 12 2z"/></svg>',
  refresh:'<svg viewBox="0 0 24 24"><path d="M12 2v8m6.4-5.4a8 8 0 1 1-12.8 0"/></svg>',
  play:   '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>',
  plus:   '<svg viewBox="0 0 24 24"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/></svg>',
  info:   '<svg viewBox="0 0 24 24"><path d="M11 10h2v7h-2zm0-4h2v2h-2zM12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/></svg>',
  trash:  '<svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13H7zM9 4h6l1 2H8z"/></svg>'
};

/* =====================================================================================
   STATE
   ===================================================================================== */
var rail = document.getElementById('rail');
var dock = document.getElementById('dock');
var cardTpl = document.getElementById('card-template');
var dockTpl = document.getElementById('dock-template');

// Per-element metadata (dialogue options + optional dialogue background) that doesn't
// belong in the DOM. Keyed by the live element so it's GC'd automatically on removal.
var elementMeta = new WeakMap();
var cardIndex = {};   // id -> element, for removeCard()/updateCard()
var dockIndex = {};   // id -> element

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2, 9); }

/* =====================================================================================
   CARD API
   addCard({
     id, title, eyebrow, hero(bool),
     faviconText, faviconImg,
     image (url) | artClass ("art-1".."art-5"),
     sound (bool),
     options: [{label, iconKey|iconSvg, danger(bool), onClick(el)}],
     dialogueBackground: "#hex" | "url(...)" | image url
   })
   ===================================================================================== */
function renderCard(data){
  data = data || {};
  var node = cardTpl.content.firstElementChild.cloneNode(true);
  var id = data.id || uid('card');
  node.dataset.id = id;

  node.classList.toggle('hero', !!data.hero);

  var art = node.querySelector('.card-art');
  if(data.image){
    art.className = 'card-art';
    art.style.backgroundImage = "url('" + data.image + "')";
  } else {
    art.className = 'card-art ' + (data.artClass || 'art-2');
    art.style.backgroundImage = '';
  }

  var favicon = node.querySelector('.favicon');
  if(data.faviconImg){
    favicon.innerHTML = '<img src="' + data.faviconImg + '" alt="">';
  } else {
    var letter = (data.faviconText || data.title || '?').trim().charAt(0).toUpperCase();
    favicon.innerHTML = '<span class="letter">' + letter + '</span>';
  }

  var sound = node.querySelector('.sound-badge');
  if(!data.sound) sound.remove();

  node.querySelector('.eyebrow').textContent = data.eyebrow || '';
  node.querySelector('.title').textContent = data.title || '';

  elementMeta.set(node, {
    options: data.options || defaultCardOptions(data),
    background: data.dialogueBackground || null
  });

  node.addEventListener('click', function(){ activateElement(node); });

  cardIndex[id] = node;
  return node;
}

function addCard(data, opts){
  opts = opts || {};
  var node = renderCard(data);
  if(opts.prepend) rail.prepend(node); else rail.appendChild(node);
  return node;
}

function updateCard(id, data){
  var old = cardIndex[id];
  if(!old) return null;
  var merged = Object.assign({}, data, { id: id });
  var fresh = renderCard(merged);
  old.replaceWith(fresh);
  return fresh;
}

function removeCard(id){
  var el = cardIndex[id];
  if(el){ el.remove(); delete cardIndex[id]; }
}

function clearRail(){
  rail.innerHTML = '';
  cardIndex = {};
}

function defaultCardOptions(data){
  return [
    { label: 'Resume', iconKey: 'play', onClick: function(el){ sendToJava({ action:'play', id: el.dataset.id }); } },
    { label: 'Refresh', iconKey: 'info', onClick: function(el){ sendToJava({ action:'info', id: el.dataset.id }); } },
    { label: 'History', iconKey: 'info', onClick: function(el){ sendToJava({ action:'info', id: el.dataset.id }); } },
    { label: 'Audio', iconKey: 'info', onClick: function(el){ sendToJava({ action:'info', id: el.dataset.id }); } },
    { label: 'Navigate', iconKey: 'info', onClick: function(el){ sendToJava({ action:'info', id: el.dataset.id }); } },
    { label: 'Add to Favorites', iconKey: 'plus', onClick: function(el){ sendToJava({ action:'add', id: el.dataset.id }); } },
    { label: 'Close', iconKey: 'trash', danger: true, onClick: function(el){ sendToJava({ action:'remove', id: el.dataset.id }); removeCard(el.dataset.id); } }
  ];
}

/* =====================================================================================
   DOCK ITEM API
   addDockItem({
     id, iconKey | iconSvg, avatarImg (turns it into the round avatar style),
     active(bool), badgeText, miniBatt,
     options: [...], dialogueBackground
   })
   ===================================================================================== */
function renderDockItem(data){
  data = data || {};
  var node = dockTpl.content.firstElementChild.cloneNode(true);
  var id = data.id || uid('dock');
  node.dataset.id = id;

  node.classList.toggle('active', !!data.active);
  node.classList.toggle('avatar', !!data.avatarImg);

  var slot = node.querySelector('.dock-icon-slot');
  if(data.avatarImg){
    slot.outerHTML = '<img src="' + data.avatarImg + '" alt="">';
  } else {
    var svg = data.iconSvg || ICONS[data.iconKey] || ICONS.home;
    slot.outerHTML = svg;
  }

  var badge = node.querySelector('.badge');
  if(data.badgeText){
    badge.textContent = data.badgeText;
    badge.classList.add('show');
  } else if(data.dot){
    badge.classList.add('green-dot', 'show');
  }



  elementMeta.set(node, {
    options: data.options || defaultDockOptions(data),
    background: data.dialogueBackground || null
  });

  node.addEventListener('click', function(){ activateElement(node); });

  dockIndex[id] = node;
  return node;
}

function addDockItem(data){
  var node = renderDockItem(data);
  dock.appendChild(node);
  return node;
}

function updateDockItem(id, data){
  var old = dockIndex[id];
  if(!old) return null;
  var merged = Object.assign({}, data, { id: id });
  var fresh = renderDockItem(merged);
  old.replaceWith(fresh);
  return fresh;
}

function removeDockItem(id){
  var el = dockIndex[id];
  if(el){ el.remove(); delete dockIndex[id]; }
}

function clearDock(){
  dock.innerHTML = '';
  dockIndex = {};
}

function defaultDockOptions(data){
  return [
    { label: 'Select', iconKey: 'play', onClick: function(el){ sendToJava({ action:'select', id: el.dataset.id }); } },
    { label: 'Settings', iconKey: 'gear', onClick: function(el){ sendToJava({ action:'settings', id: el.dataset.id }); } }
  ];
}

/* =====================================================================================
   DIALOGUE (modal with full-page backdrop blur)
   openDialogue(targetElement, options, background)
     targetElement : the clicked DOM element (or null for a generic dialog)
     options       : [{ label, iconKey|iconSvg, danger(bool), onClick(targetElement) }]
     background    : CSS color ("#221", "rgba(...)") OR an image url
   ===================================================================================== */
var dlgFocusIndex = 0;

function openDialogue(targetElement, options, background){
  closeDialogue();
  options = options || [];

  var overlay = document.createElement('div');
  overlay.className = 'dlg-overlay';
  overlay.id = 'dlg-overlay';

  var panel = document.createElement('div');
  panel.className = 'dlg-panel';

  if(background){
    if(/^https?:|^data:/.test(background)){
      panel.style.backgroundImage = "url('" + background + "')";
    } else {
      panel.style.background = background;
    }
  }

  if(targetElement){
    var previewWrap = document.createElement('div');
    previewWrap.className = 'dlg-preview-wrap';
    var preview = targetElement.cloneNode(true);
    preview.classList.add('dlg-preview');
    preview.classList.remove('is-focused');
    preview.removeAttribute('tabindex');
    previewWrap.appendChild(preview);
    panel.appendChild(previewWrap);

   
  }

  var list = document.createElement('div');
  list.className = 'dlg-options';
  options.forEach(function(opt, i){
    var btn = document.createElement('button');
    btn.className = 'dlg-option' + (opt.danger ? ' is-danger' : '');
    btn.dataset.idx = i;
    var iconMarkup = opt.iconSvg || (opt.iconKey ? ICONS[opt.iconKey] : '') || '';
    btn.innerHTML = (iconMarkup ? '<span class="dlg-opt-icon">' + iconMarkup + '</span>' : '') +
                    '<span>' + opt.label + '</span>';
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      if(typeof opt.onClick === 'function') opt.onClick(targetElement);
      closeDialogue();
    });
    list.appendChild(btn);
  });
  panel.appendChild(list);

  overlay.appendChild(panel);
  overlay.addEventListener('click', function(e){ if(e.target === overlay) closeDialogue(); });
  document.body.appendChild(overlay);

  dlgFocusIndex = 0;
  requestAnimationFrame(function(){
    overlay.classList.add('open');
    focusDialogueOption(0);
  });

  document.addEventListener('keydown', dlgKeyHandler, true);
}

function focusDialogueOption(i){
  var btns = document.querySelectorAll('#dlg-overlay .dlg-option');
  if(!btns.length) return;
  if(i < 0) i = btns.length - 1;
  if(i >= btns.length) i = 0;
  dlgFocusIndex = i;
  btns.forEach(function(b){ b.classList.remove('is-focused'); });
  btns[i].classList.add('is-focused');
  btns[i].focus();
}

function dlgKeyHandler(e){
  var overlay = document.getElementById('dlg-overlay');
  if(!overlay) return;
  if(e.key === 'Escape'){ e.preventDefault(); closeDialogue(); return; }
  if(e.key === 'ArrowDown'){ e.preventDefault(); focusDialogueOption(dlgFocusIndex + 1); return; }
  if(e.key === 'ArrowUp'){ e.preventDefault(); focusDialogueOption(dlgFocusIndex - 1); return; }
  if(e.key === 'Enter' || e.key === ' '){
    e.preventDefault();
    var btns = document.querySelectorAll('#dlg-overlay .dlg-option');
    if(btns[dlgFocusIndex]) btns[dlgFocusIndex].click();
  }
}

function closeDialogue(){
  var overlay = document.getElementById('dlg-overlay');
  if(!overlay) return;
  overlay.classList.remove('open');
  document.removeEventListener('keydown', dlgKeyHandler, true);
  setTimeout(function(){ overlay.remove(); }, 180);
}

function isDialogueOpen(){ return !!document.getElementById('dlg-overlay'); }

/* =====================================================================================
   KEYBOARD / SPATIAL NAVIGATION across rail + dock (live DOM query, so newly added
   cards/dock items are picked up automatically — no caching needed).
   ===================================================================================== */
var pos = { row: 'rail', index: 0 };

function currentList(row){
  return Array.prototype.slice.call(
    document.querySelectorAll(row === 'rail' ? '#rail .card' : '#dock .dock-item')
  );
}

function clearFocusStyles(){
  currentList('rail').forEach(function(el){ el.classList.remove('is-focused'); });
  currentList('dock').forEach(function(el){ el.classList.remove('is-focused'); });
}

function applyFocus(){
  clearFocusStyles();
  var list = currentList(pos.row);
  var el = list[pos.index];
  if(!el) return;
  el.classList.add('is-focused');
  el.focus({ preventScroll:true });
  if(pos.row === 'rail'){
    el.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }
}

function move(dx, dy){
  if(dy !== 0){
    var nextRow = dy > 0 ? 'dock' : 'rail';
    if(nextRow === pos.row) return;
    var targetList = currentList(nextRow);
    var curList = currentList(pos.row);
    var ratio = curList.length > 1 ? pos.index / (curList.length - 1) : 0;
    pos = { row: nextRow, index: Math.round(ratio * (targetList.length - 1)) };
    applyFocus();
    return;
  }
  var list = currentList(pos.row);
  var next = pos.index + dx;
  if(next < 0) next = 0;
  if(next > list.length - 1) next = list.length - 1;
  pos.index = next;
  applyFocus();
}

function activateElement(el){
  el.style.transform = el.classList.contains('card')
    ? 'translateY(-8px) scale(0.97)'
    : 'scale(0.85)';
  setTimeout(function(){ el.style.transform = ''; }, 120);
  var meta = elementMeta.get(el) || {};
  openDialogue(el, meta.options || [], meta.background || null);
}

function activateFocused(){
  var list = currentList(pos.row);
  var el = list[pos.index];
  if(el) activateElement(el);
}

document.addEventListener('keydown', function(e){
  if(isDialogueOpen()) return; // dialogue owns the keyboard while open
  switch(e.key){
    case 'ArrowLeft':  e.preventDefault(); move(-1, 0); break;
    case 'ArrowRight': e.preventDefault(); move(1, 0);  break;
    case 'ArrowUp':    e.preventDefault(); move(0, -1); break;
    case 'ArrowDown':  e.preventDefault(); move(0, 1);  break;
    case 'Enter':
    case ' ':
      e.preventDefault(); activateFocused(); break;
  }
});

rail.addEventListener('mouseenter', function(e){
  var card = e.target.closest('.card');
  if(!card) return;
  var list = currentList('rail');
  var idx = list.indexOf(card);
  if(idx > -1){ pos = { row:'rail', index: idx }; applyFocus(); }
}, true);
dock.addEventListener('mouseenter', function(e){
  var item = e.target.closest('.dock-item');
  if(!item) return;
  var list = currentList('dock');
  var idx = list.indexOf(item);
  if(idx > -1){ pos = { row:'dock', index: idx }; applyFocus(); }
}, true);

/* =====================================================================================
   JAVA <-> JS BRIDGE  (WebMessageChannel / addJavascriptInterface friendly)

   Java -> JS, any of these will work depending on how the bridge was wired up:
     1) window.postMessage(jsonString)  -> caught by the 'message' listener below
        (this is how Android WebViewCompat WebMessageListener / postWebMessage works)
     2) webView.evaluateJavascript("receiveData('" + json + "')", null)
     3) if Java injected an object named NativeBridge with an onmessage hook, e.g:
            window.NativeBridge.onmessage = function(e){ ... }
        we wire that up automatically below.

   JS -> Java: call sendToJava({...}). It tries the common bridge object names in turn
   and falls back to console.log so you can see what would have been sent while testing
   in a plain browser.

   Expected JSON shape from Java:
   {
     "type": "init" | "addCard" | "updateCard" | "removeCard" | "clearRail" |
              "addDockItem" | "updateDockItem" | "removeDockItem" | "clearDock" | "clock",
     "cards": [ {..card data..}, ... ],   // for type "init"
     "dock":  [ {..dock data..}, ... ],   // for type "init"
     "card":  {..card data..},            // for type "addCard" / "updateCard"
     "item":  {..dock data..},            // for type "addDockItem" / "updateDockItem"
     "id":    "card_123",                 // for update/remove
     "text":  "4:12 PM"                   // for type "clock"
   }
   ===================================================================================== */
function processChannelMessage(data){
  if(!data || !data.type) return;
  switch(data.type){
    case 'init':
      clearRail(); clearDock();
      (data.cards || []).forEach(function(c){ addCard(c); });
      (data.dock || []).forEach(function(d){ addDockItem(d); });
      applyFocus();
      break;
    case 'addCard':       addCard(data.card); break;
    case 'updateCard':    updateCard(data.id, data.card); break;
    case 'removeCard':    removeCard(data.id); break;
    case 'clearRail':     clearRail(); break;
    case 'addDockItem':    addDockItem(data.item); break;
    case 'updateDockItem': updateDockItem(data.id, data.item); break;
    case 'removeDockItem': removeDockItem(data.id); break;
    case 'clearDock':      clearDock(); break;
    case 'clock':
      var clockEl = document.getElementById('clock');
      if(clockEl && data.text) clockEl.textContent = data.text;
      break;
    default:
      console.warn('Unknown channel message type:', data.type);
  }
}

function handleIncomingPayload(raw){
  try{
    var data = typeof raw === 'string' ? JSON.parse(raw) : raw;
    processChannelMessage(data);
  } catch(err){
    console.error('Bad payload from Java bridge:', err, raw);
  }
}

// Pattern 1: window.postMessage / WebMessageChannel ports
window.addEventListener('message', function(event){ handleIncomingPayload(event.data); });

// Pattern 2: Java calls this directly via evaluateJavascript("receiveData('...')")
window.receiveData = handleIncomingPayload;

// Pattern 3: an injected NativeBridge-style object with its own onmessage hook
if(window.NativeBridge){
  window.NativeBridge.onmessage = function(event){
    handleIncomingPayload(event && event.data !== undefined ? event.data : event);
  };
}

function sendToJava(payload){
  var json = JSON.stringify(payload);
  try{
    if(window.NativeBridge && window.NativeBridge.postMessage){ window.NativeBridge.postMessage(json); return; }
  } catch(e){}
  try{
    if(window.AndroidBridge && window.AndroidBridge.postMessage){ window.AndroidBridge.postMessage(json); return; }
  } catch(e){}
  console.log('sendToJava (no bridge found, logging instead):', json);
}
